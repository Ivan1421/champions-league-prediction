<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЛЧ 2026 - Симулятор</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --ucl-deep: #00041a;
            --ucl-blue: #020e4b;
            --ucl-accent: #0033ff;
            --gold: #c5a059;
            --glass: rgba(255, 255, 255, 0.07);
            --glass-border: rgba(255, 255, 255, 0.12);
        }

        body {
            background: radial-gradient(circle at center, var(--ucl-blue) 0%, var(--ucl-deep) 100%);
            color: white;
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            overflow: hidden; 
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header { text-align: center; padding: 20px 0; }
        h1 { font-weight: 900; letter-spacing: 5px; margin: 0; font-size: 24px; text-transform: uppercase; }

        .bracket-grid {
            display: grid;
            grid-template-columns: 1.2fr 1.1fr 1fr 1.6fr 1fr 1.1fr 1.2fr;
            gap: 25px;
            width: 98vw;
            max-width: 1800px;
            margin: auto;
            height: 85vh;
            align-items: stretch;
        }

        .column { display: flex; flex-direction: column; height: 100%; }
        .col-1-8 { justify-content: space-around; }
        .col-1-4 { justify-content: space-evenly; padding: 60px 0; }
        .col-1-2 { justify-content: center; } 

        h3 { font-size: 10px; letter-spacing: 2px; color: var(--gold); text-align: center; margin-bottom: 5px; opacity: 0.7; text-transform: uppercase; }

        .matchup {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            padding: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .team-slot {
            height: 55px;
            display: flex;
            align-items: center;
            padding: 0 15px;
            cursor: pointer;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            margin: 5px 0;
            border-radius: 4px;
        }

        .team-slot:hover { background: rgba(255, 255, 255, 0.1); transform: scale(1.02); }
        .team-slot img { height: 38px; width: 38px; object-fit: contain; margin-right: 15px; }
        .team-name { font-size: 12px; font-weight: 700; text-transform: uppercase; }

        /* ФИНАЛЬНЫЙ БЛОК */
        .final-column {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .cup-img { width: 210px; margin-bottom: 15px; transition: 0.5s; filter: drop-shadow(0 0 20px rgba(255,255,255,0.1)); }

        .final-horiz-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 30px;
        }

        .final-slot {
            width: 130px;
            height: 130px;
            background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 70%);
            border: 3px dashed var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            cursor: pointer;
            transition: 0.4s;
        }

        .final-slot:hover { border-color: var(--ucl-accent); transform: scale(1.05); }
        .final-slot img { width: 95px; }

        .vs-divider { font-weight: 900; color: var(--gold); border: 2px solid var(--gold); padding: 10px; border-radius: 50%; background: var(--ucl-deep); font-size: 14px; }

        .winner-announcement { 
            margin-top: 25px; 
            text-align: center; 
            min-height: 90px; 
        }

        .winner-name { font-size: 26px; font-weight: 900; color: var(--gold); display: block; letter-spacing: 1px; }
        .final-prob { font-size: 15px; color: var(--ucl-accent); margin-top: 8px; font-weight: 600; }

        .easter-egg { color: #ff4d4d; animation: shake 0.3s infinite; }
        @keyframes shake { 0% { transform: translateX(2px); } 50% { transform: translateX(-2px); } }

        .advanced { animation: pop 0.4s ease-out; }
        @keyframes pop { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

    <header><h1>Путь к финалу ЛЧ 2026</h1></header>

    <div class="bracket-grid">
        <div class="column col-1-8">
            <h3>1/8 Финала</h3>
            <div class="matchup" data-next="qf1" data-slot="0">
                <div class="team-slot" onclick="advance(this, 'PSG', '4.6%')"><img src="psg.png"><span class="team-name">PSG</span></div>
                <div class="team-slot" onclick="advance(this, 'Chelsea', '6.9%')"><img src="chelsea.png"><span class="team-name">Chelsea</span></div>
            </div>
            <div class="matchup" data-next="qf1" data-slot="1">
                <div class="team-slot" onclick="advance(this, 'Liverpool', '12.8%')"><img src="liverpool.png"><span class="team-name">Liverpool</span></div>
                <div class="team-slot" onclick="advance(this, 'Galatasaray', '0.2%')"><img src="gala.png"><span class="team-name">Gala</span></div>
            </div>
            <div class="matchup" data-next="qf2" data-slot="0">
                <div class="team-slot" onclick="advance(this, 'Man City', '10.8%')"><img src="city.png"><span class="team-name">Man City</span></div>
                <div class="team-slot" onclick="advance(this, 'Real Madrid', '2.8%')"><img src="real.png"><span class="team-name">Real</span></div>
            </div>
            <div class="matchup" data-next="qf2" data-slot="1">
                <div class="team-slot" onclick="advance(this, 'Bayern', '14.3%')"><img src="bayern.png"><span class="team-name">Bayern</span></div>
                <div class="team-slot" onclick="advance(this, 'Atalanta', '1.1%')"><img src="atalanta.png"><span class="team-name">Atalanta</span></div>
            </div>
        </div>

        <div class="column col-1-4">
            <h3>1/4 Финала</h3>
            <div class="matchup" id="qf1" data-next="sf1" data-slot="0"><div class="team-slot"></div><div class="team-slot"></div></div>
            <div class="matchup" id="qf2" data-next="sf1" data-slot="1"><div class="team-slot"></div><div class="team-slot"></div></div>
        </div>

        <div class="column col-1-2">
            <h3>Полуфинал</h3>
            <div class="matchup" id="sf1" data-next="final" data-slot="left"><div class="team-slot"></div><div class="team-slot"></div></div>
        </div>

        <div class="final-column">
            <img src="ucl_cup.png" class="cup-img" alt="Кубок ЛЧ">
            <div class="final-horiz-container">
                <div class="final-slot" id="final-left" onclick="declareWinner(this)"></div>
                <div class="vs-divider">VS</div>
                <div class="final-slot" id="final-right" onclick="declareWinner(this)"></div>
            </div>
            <div class="winner-announcement" id="winner-box">
                <span id="winner-text" class="winner-name"></span>
                <div id="winner-stats" class="final-prob"></div>
            </div>
        </div>

        <div class="column col-1-2">
            <h3>Полуфинал</h3>
            <div class="matchup" id="sf2" data-next="final" data-slot="right"><div class="team-slot"></div><div class="team-slot"></div></div>
        </div>

        <div class="column col-1-4">
            <h3>1/4 Финала</h3>
            <div class="matchup" id="qf3" data-next="sf2" data-slot="0"><div class="team-slot"></div><div class="team-slot"></div></div>
            <div class="matchup" id="qf4" data-next="sf2" data-slot="1"><div class="team-slot"></div><div class="team-slot"></div></div>
        </div>

        <div class="column col-1-8">
            <h3>1/8 Финала</h3>
            <div class="matchup" data-next="qf3" data-slot="0">
                <div class="team-slot" onclick="advance(this, 'Barcelona', '7.7%')"><img src="barca.png"><span class="team-name">Barca</span></div>
                <div class="team-slot" onclick="advance(this, 'Newcastle', '4.7%')"><img src="newcastle.png"><span class="team-name">Newcastle</span></div>
            </div>
            <div class="matchup" data-next="qf3" data-slot="1">
                <div class="team-slot" onclick="advance(this, 'Atletico', '2.0%')"><img src="atletico.png"><span class="team-name">Atletico</span></div>
                <div class="team-slot" onclick="advance(this, 'Tottenham', '1.2%')"><img src="spurs.png"><span class="team-name">Spurs</span></div>
            </div>
            <div class="matchup" data-next="qf4" data-slot="0">
                <div class="team-slot" onclick="advance(this, 'Sporting', '2.7%')"><img src="sporting.png"><span class="team-name">Sporting</span></div>
                <div class="team-slot" onclick="advance(this, 'Bodo/Glimt', '0.4%')"><img src="bodo.png"><span class="team-name">Bodo</span></div>
            </div>
            <div class="matchup" data-next="qf4" data-slot="1">
                <div class="team-slot" onclick="advance(this, 'Arsenal', '27.4%')"><img src="arsenal.png"><span class="team-name">Arsenal</span></div>
                <div class="team-slot" onclick="advance(this, 'Leverkusen', '0.5%')"><img src="bayer.png"><span class="team-name">Bayer</span></div>
            </div>
        </div>
    </div>

    <script>
        function advance(element, teamName, probability) {
            const currentMatchup = element.closest('.matchup');
            const nextId = currentMatchup.getAttribute('data-next');
            const slot = currentMatchup.getAttribute('data-slot');
            const imgTag = element.querySelector('img');
            if(!imgTag) return;

            if (nextId === 'final') {
                const finalSlot = document.getElementById('final-' + slot);
                finalSlot.innerHTML = `<img src="${imgTag.src}" class="advanced">`;
                finalSlot.setAttribute('data-team', teamName);
                finalSlot.setAttribute('data-prob', probability);
                // Очистка победителя при смене финалиста
                document.getElementById('winner-text').innerText = "";
                document.getElementById('winner-stats').innerText = "";
            } else {
                const nextMatchup = document.getElementById(nextId);
                const targetSlot = nextMatchup.querySelectorAll('.team-slot')[slot];
                targetSlot.innerHTML = `<img src="${imgTag.src}" class="advanced"> <span class="team-name">${teamName}</span>`;
                targetSlot.onclick = function() { advance(this, teamName, probability); };
            }
        }

        function declareWinner(element) {
            const team = element.getAttribute('data-team');
            const prob = element.getAttribute('data-prob');
            if(!team) return;

            const winName = document.getElementById('winner-text');
            const winStats = document.getElementById('winner-stats');
            
            if (team === 'Man City') {
                winName.innerText = "Максим, это только твои фантазии!";
                winName.className = "winner-name easter-egg";
                winStats.innerText = "";
            } else {
                winName.innerText = "ЧЕМПИОН: " + team.toUpperCase();
                winName.className = "winner-name";
                winStats.innerText = "Вероятность победы: " + prob;
            }
            
            document.querySelectorAll('.final-slot').forEach(s => s.style.boxShadow = "none");
            element.style.boxShadow = "0 0 50px var(--gold)";
            document.querySelector('.cup-img').style.transform = "scale(1.1) rotate(-5deg)";
        }
    </script>
</body>
</html>
