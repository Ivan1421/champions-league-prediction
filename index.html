<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCL 2026 - No Overlap Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --ucl-deep: #00041a;
            --ucl-blue: #020e4b;
            --ucl-accent: #0033ff;
            --gold: #c5a059;
            --glass: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
        }

        body {
            background: radial-gradient(circle at center, var(--ucl-blue) 0%, var(--ucl-deep) 100%);
            color: white;
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden; /* Запрещаем боковой скролл самого тела */
        }

        header { text-align: center; padding: 20px 0; flex-shrink: 0; }
        h1 { font-weight: 900; letter-spacing: 5px; margin: 0; font-size: 1.5rem; text-transform: uppercase; color: white; }

        /* Обертка, которая позволяет скроллить и влево-вправо, и вверх-вниз */
        .main-scroll-area {
            flex-grow: 1;
            overflow: auto;
            padding: 20px;
        }

        .bracket-container {
            display: grid;
            /* Увеличенные зазоры между колонками (100px вокруг финала) */
            grid-template-columns: 220px 180px 160px 450px 160px 180px 220px;
            /* Фиксированная высота строк гарантирует отсутствие наслоения */
            grid-template-rows: 50px repeat(8, 120px); 
            column-gap: 40px;
            row-gap: 10px;
            min-width: 1800px; /* Чтобы сетка не сжималась */
            margin: 0 auto;
        }

        .stage-title {
            font-size: 12px;
            font-weight: 900;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 3px;
            text-align: center;
            align-self: center;
            border-bottom: 1px solid rgba(197, 160, 89, 0.3);
            padding-bottom: 10px;
        }

        .match-box { 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center;
            height: 100%;
        }

        /* Координаты Grid (теперь с запасом) */
        .m1-8-1 { grid-column: 1; grid-row: 2 / 4; }
        .m1-8-2 { grid-column: 1; grid-row: 4 / 6; }
        .m1-8-3 { grid-column: 1; grid-row: 6 / 8; }
        .m1-8-4 { grid-column: 1; grid-row: 8 / 10; }
        
        .m1-8-5 { grid-column: 7; grid-row: 2 / 4; }
        .m1-8-6 { grid-column: 7; grid-row: 4 / 6; }
        .m1-8-7 { grid-column: 7; grid-row: 6 / 8; }
        .m1-8-8 { grid-column: 7; grid-row: 8 / 10; }

        .m1-4-1 { grid-column: 2; grid-row: 3 / 5; }
        .m1-4-2 { grid-column: 2; grid-row: 7 / 9; }
        .m1-4-3 { grid-column: 6; grid-row: 3 / 5; }
        .m1-4-4 { grid-column: 6; grid-row: 7 / 9; }

        .m1-2-1 { grid-column: 3; grid-row: 4 / 8; }
        .m1-2-2 { grid-column: 5; grid-row: 4 / 8; }

        .final-zone { 
            grid-column: 4; grid-row: 2 / 10; 
            display: flex; flex-direction: column; 
            justify-content: center; align-items: center;
            /* Гарантированный отступ внутри центральной колонки */
            padding: 0 40px; 
        }

        /* Стили карточек */
        .matchup {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 12px;
            width: 100%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        .team-slot {
            height: 50px;
            display: flex;
            align-items: center;
            padding: 0 12px;
            cursor: pointer;
            margin: 5px 0;
            border-radius: 8px;
            background: rgba(255,255,255,0.03);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .team-slot:hover { background: rgba(255, 255, 255, 0.1); transform: scale(1.02); }
        .team-slot img { height: 40px; width: 40px; object-fit: contain; margin-right: 15px; }
        .team-name { font-size: 13px; font-weight: 800; text-transform: uppercase; color: #fff; }

        /* Финальные элементы */
        .cup-img { width: 220px; margin-bottom: 30px; filter: drop-shadow(0 0 60px rgba(255,255,255,0.2)); }
        .final-horiz { display: flex; align-items: center; gap: 40px; }
        
        .final-slot {
            width: 160px; height: 160px;
            border: 4px dashed var(--gold);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; background: rgba(0,0,0,0.5);
            transition: 0.5s ease;
        }

        .final-slot img { width: 120px; height: 120px; object-fit: contain; }
        .vs-divider { color: var(--gold); border: 3px solid var(--gold); padding: 15px; border-radius: 50%; background: var(--ucl-deep); font-weight: 900; font-size: 16px; }

        /* Победный блок (теперь с фиксированным местом) */
        .winner-announcement { 
            margin-top: 40px;
            text-align: center; 
            background: rgba(0,0,0,0.8);
            padding: 20px 40px;
            border-radius: 20px;
            border: 2px solid var(--gold);
            min-width: 320px;
            box-shadow: 0 0 50px rgba(0,0,0,0.7);
        }
        .winner-name { font-size: 22px; font-weight: 900; color: var(--gold); display: block; margin-bottom: 10px; }
        .final-prob { font-size: 13px; color: var(--ucl-accent); font-weight: 700; text-transform: uppercase; letter-spacing: 2px; }

        /* Скроллбары */
        .main-scroll-area::-webkit-scrollbar { width: 10px; height: 10px; }
        .main-scroll-area::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 10px; }
        .main-scroll-area::-webkit-scrollbar-track { background: var(--ucl-deep); }

        .advanced { animation: pop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes pop { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

    <header><h1>UCL 2026 PREDICTOR</h1></header>

    <div class="main-scroll-area" id="scrollContainer">
        <div class="bracket-container">
            <div class="stage-title">ROUND OF 16</div>
            <div class="stage-title">QUARTER-FINALS</div>
            <div class="stage-title">SEMI-FINALS</div>
            <div class="stage-title" style="color: white; border-color: white;">FINAL 2026</div>
            <div class="stage-title">SEMI-FINALS</div>
            <div class="stage-title">QUARTER-FINALS</div>
            <div class="stage-title">ROUND OF 16</div>

            <div class="match-box m1-8-1"><div class="matchup" data-next="qf1" data-slot="0">
                <div class="team-slot" onclick="advance(this, 'PSG', '4.6%')"><img src="psg.png"><span class="team-name">PSG</span></div>
                <div class="team-slot" onclick="advance(this, 'Chelsea', '6.9%')"><img src="chelsea.png"><span class="team-name">Chelsea</span></div>
            </div></div>
            <div class="match-box m1-8-2"><div class="matchup" data-next="qf1" data-slot="1">
                <div class="team-slot" onclick="advance(this, 'Liverpool', '12.8%')"><img src="liverpool.png"><span class="team-name">Liverpool</span></div>
                <div class="team-slot" onclick="advance(this, 'Galatasaray', '0.2%')"><img src="gala.png"><span class="team-name">Gala</span></div>
            </div></div>
            <div class="match-box m1-8-3"><div class="matchup" data-next="qf2" data-slot="0">
                <div class="team-slot" onclick="advance(this, 'Man City', '10.8%')"><img src="city.png"><span class="team-name">Man City</span></div>
                <div class="team-slot" onclick="advance(this, 'Real Madrid', '2.8%')"><img src="real.png"><span class="team-name">Real</span></div>
            </div></div>
            <div class="match-box m1-8-4"><div class="matchup" data-next="qf2" data-slot="1">
                <div class="team-slot" onclick="advance(this, 'Bayern', '14.3%')"><img src="bayern.png"><span class="team-name">Bayern</span></div>
                <div class="team-slot" onclick="advance(this, 'Atalanta', '1.1%')"><img src="atalanta.png"><span class="team-name">Atalanta</span></div>
            </div></div>

            <div class="match-box m1-4-1"><div class="matchup" id="qf1" data-next="sf1" data-slot="0"><div class="team-slot"></div><div class="team-slot"></div></div></div>
            <div class="match-box m1-4-2"><div class="matchup" id="qf2" data-next="sf1" data-slot="1"><div class="team-slot"></div><div class="team-slot"></div></div></div>
            <div class="match-box m1-2-1"><div class="matchup" id="sf1" data-next="final" data-slot="left"><div class="team-slot" style="height:65px"></div><div class="team-slot" style="height:65px"></div></div></div>

            <div class="final-zone">
                <img src="ucl_cup.png" class="cup-img">
                <div class="final-horiz">
                    <div class="final-slot" id="final-left" onclick="declareWinner(this)"></div>
                    <div class="vs-divider">VS</div>
                    <div class="final-slot" id="final-right" onclick="declareWinner(this)"></div>
                </div>
                <div class="winner-announcement" id="winner-box" style="visibility:hidden">
                    <span id="winner-text" class="winner-name"></span>
                    <div id="winner-stats" class="final-prob"></div>
                </div>
            </div>

            <div class="match-box m1-2-2"><div class="matchup" id="sf2" data-next="final" data-slot="right"><div class="team-slot" style="height:65px"></div><div class="team-slot" style="height:65px"></div></div></div>
            <div class="match-box m1-4-3"><div class="matchup" id="qf3" data-next="sf2" data-slot="0"><div class="team-slot"></div><div class="team-slot"></div></div></div>
            <div class="match-box m1-4-4"><div class="matchup" id="qf4" data-next="sf2" data-slot="1"><div class="team-slot"></div><div class="team-slot"></div></div></div>

            <div class="match-box m1-8-5"><div class="matchup" data-next="qf3" data-slot="0">
                <div class="team-slot" onclick="advance(this, 'Barcelona', '7.7%')"><img src="barca.png"><span class="team-name">Barca</span></div>
                <div class="team-slot" onclick="advance(this, 'Newcastle', '4.7%')"><img src="newcastle.png"><span class="team-name">Newcastle</span></div>
            </div></div>
            <div class="match-box m1-8-6"><div class="matchup" data-next="qf3" data-slot="1">
                <div class="team-slot" onclick="advance(this, 'Atletico', '2.0%')"><img src="atletico.png"><span class="team-name">Atletico</span></div>
                <div class="team-slot" onclick="advance(this, 'Tottenham', '1.2%')"><img src="spurs.png"><span class="team-name">Spurs</span></div>
            </div></div>
            <div class="match-box m1-8-7"><div class="matchup" data-next="qf4" data-slot="0">
                <div class="team-slot" onclick="advance(this, 'Sporting', '2.7%')"><img src="sporting.png"><span class="team-name">Sporting</span></div>
                <div class="team-slot" onclick="advance(this, 'Bodo/Glimt', '0.4%')"><img src="bodo.png"><span class="team-name">Bodo</span></div>
            </div></div>
            <div class="match-box m1-8-8"><div class="matchup" data-next="qf4" data-slot="1">
                <div class="team-slot" onclick="advance(this, 'Arsenal', '27.4%')"><img src="arsenal.png"><span class="team-name">Arsenal</span></div>
                <div class="team-slot" onclick="advance(this, 'Leverkusen', '0.5%')"><img src="bayer.png"><span class="team-name">Bayer</span></div>
            </div></div>
        </div>
    </div>

    <script>
        // Скроллим к финалу при загрузке
        window.onload = function() {
            const container = document.getElementById('scrollContainer');
            const centerX = (container.scrollWidth - container.clientWidth) / 2;
            container.scrollLeft = centerX;
        };

        function advance(element, teamName, probability) {
            const currentMatchup = element.closest('.matchup');
            const nextId = currentMatchup.getAttribute('data-next');
            const slot = currentMatchup.getAttribute('data-slot');
            const imgTag = element.querySelector('img');
            if(!imgTag) return;

            if (nextId === 'final') {
                const finalSlot = document.getElementById('final-' + slot);
                finalSlot.innerHTML = `<img src="${imgTag.src}" class="advanced">`;
                finalSlot.setAttribute('data-team', teamName);
                finalSlot.setAttribute('data-prob', probability);
                document.getElementById('winner-box').style.visibility = "hidden";
            } else {
                const nextMatchup = document.getElementById(nextId);
                const targetSlot = nextMatchup.querySelectorAll('.team-slot')[slot];
                targetSlot.innerHTML = `<img src="${imgTag.src}" class="advanced"> <span class="team-name">${teamName}</span>`;
                targetSlot.onclick = function() { advance(this, teamName, probability); };
            }
        }

        function declareWinner(element) {
            const team = element.getAttribute('data-team');
            const prob = element.getAttribute('data-prob');
            if(!team) return;

            const winBox = document.getElementById('winner-box');
            const winName = document.getElementById('winner-text');
            const winStats = document.getElementById('winner-stats');
            
            winBox.style.visibility = "visible";
            
            if (team === 'Man City') {
                winName.innerText = "Максим, это только твои фантазии!";
                winName.style.color = "#ff4d4d";
                winStats.innerText = "";
            } else {
                winName.innerText = "ЧЕМПИОН: " + team.toUpperCase();
                winName.style.color = "var(--gold)";
                winStats.innerText = "ВЕРОЯТНОСТЬ ПОБЕДЫ: " + prob;
            }
            document.querySelectorAll('.final-slot').forEach(s => s.style.boxShadow = "none");
            element.style.boxShadow = "0 0 60px var(--gold)";
        }
    </script>
</body>
</html>
