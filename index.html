<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1800"> 
    <title>UCL 2026 - Final Odds Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --ucl-deep: #00041a;
            --ucl-blue: #020e4b;
            --ucl-accent: #0033ff;
            --gold: #c5a059;
            --glass: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
        }

        body {
            background: radial-gradient(circle at center, var(--ucl-blue) 0%, var(--ucl-deep) 100%);
            color: white;
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: auto; 
        }

        header { text-align: center; padding: 25px 0; flex-shrink: 0; }
        h1 { font-weight: 900; letter-spacing: 5px; margin: 0; font-size: 1.8rem; text-transform: uppercase; }

        .master-wrapper {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 60px 40px;
            min-width: 1750px;
        }

        .bracket-container {
            display: grid;
            grid-template-columns: 240px 200px 180px 450px 180px 200px 240px;
            grid-template-rows: 50px repeat(8, 95px);
            column-gap: 30px;
            row-gap: 15px;
        }

        .stage-title {
            font-size: 12px; font-weight: 900; color: var(--gold);
            text-transform: uppercase; letter-spacing: 3px; text-align: center;
            align-self: center; border-bottom: 1px solid rgba(197, 160, 89, 0.3);
            padding-bottom: 10px;
        }

        .match-box { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100%; }

        /* Позиции */
        .m1-8-1 { grid-column: 1; grid-row: 2 / 4; }
        .m1-8-2 { grid-column: 1; grid-row: 4 / 6; }
        .m1-8-3 { grid-column: 1; grid-row: 6 / 8; }
        .m1-8-4 { grid-column: 1; grid-row: 8 / 10; }
        .m1-8-5 { grid-column: 7; grid-row: 2 / 4; }
        .m1-8-6 { grid-column: 7; grid-row: 4 / 6; }
        .m1-8-7 { grid-column: 7; grid-row: 6 / 8; }
        .m1-8-8 { grid-column: 7; grid-row: 8 / 10; }
        .m1-4-1 { grid-column: 2; grid-row: 3 / 5; }
        .m1-4-2 { grid-column: 2; grid-row: 7 / 9; }
        .m1-4-3 { grid-column: 6; grid-row: 3 / 5; }
        .m1-4-4 { grid-column: 6; grid-row: 7 / 9; }
        .m1-2-1 { grid-column: 3; grid-row: 4 / 8; }
        .m1-2-2 { grid-column: 5; grid-row: 4 / 8; }

        .final-zone { 
            grid-column: 4; grid-row: 4 / 8; 
            display: flex; justify-content: center; align-items: center; position: relative;
        }

        .cup-img { 
            position: absolute; top: -75px; width: 190px; 
            filter: drop-shadow(0 0 50px rgba(255,255,255,0.2)); z-index: 1;
        }

        .final-horiz { display: flex; align-items: center; gap: 40px; z-index: 2; }
        
        .final-slot {
            width: 155px; height: 155px;
            border: 4px dashed var(--gold); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; background: rgba(0,0,0,0.5); transition: 0.4s;
        }
        .final-slot img { width: 115px; height: 115px; object-fit: contain; }
        .vs-divider { color: var(--gold); border: 2px solid var(--gold); padding: 15px; border-radius: 50%; background: var(--ucl-deep); font-weight: 900; font-size: 16px; }

        .winner-announcement { 
            position: absolute; bottom: -100px; text-align: center; 
            background: rgba(0,0,0,0.9); padding: 15px 45px;
            border-radius: 15px; border: 2px solid var(--gold);
            min-width: 340px; box-shadow: 0 0 40px rgba(0,0,0,0.6);
        }
        .winner-name { font-size: 20px; font-weight: 900; color: var(--gold); display: block; margin-bottom: 5px; }
        .winner-chance { font-size: 13px; color: #00d4ff; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }

        .matchup { background: var(--glass); backdrop-filter: blur(10px); border: 1px solid var(--glass-border); border-radius: 12px; padding: 12px; width: 100%; }
        .team-slot { height: 50px; display: flex; align-items: center; padding: 0 15px; cursor: pointer; margin: 5px 0; border-radius: 8px; background: rgba(255,255,255,0.03); transition: 0.2s; }
        .team-slot:hover { background: rgba(255, 255, 255, 0.1); }
        .team-slot img { height: 38px; width: 38px; object-fit: contain; margin-right: 15px; }
        .team-name { font-size: 12px; font-weight: 800; text-transform: uppercase; }

        .advanced { animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes pop { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

    <header><h1>UCL 2026 PREDICTOR</h1></header>

    <div class="master-wrapper">
        <div class="bracket-container">
            <div class="stage-title">ROUND OF 16</div>
            <div class="stage-title">QUARTER-FINALS</div>
            <div class="stage-title">SEMI-FINALS</div>
            <div class="stage-title" style="color:white; border-color:white;">GRAND FINAL</div>
            <div class="stage-title">SEMI-FINALS</div>
            <div class="stage-title">QUARTER-FINALS</div>
            <div class="stage-title">ROUND OF 16</div>

            <div class="match-box m1-8-1"><div class="matchup" data-next="qf1" data-slot="0">
                <div class="team-slot" onclick="advance(this, 'PSG')"><img src="psg.png"><span class="team-name">PSG</span></div>
                <div class="team-slot" onclick="advance(this, 'Chelsea')"><img src="chelsea.png"><span class="team-name">Chelsea</span></div>
            </div></div>
            <div class="match-box m1-8-2"><div class="matchup" data-next="qf1" data-slot="1">
                <div class="team-slot" onclick="advance(this, 'Liverpool')"><img src="liverpool.png"><span class="team-name">Liverpool</span></div>
                <div class="team-slot" onclick="advance(this, 'Galatasaray')"><img src="gala.png"><span class="team-name">Gala</span></div>
            </div></div>
            <div class="match-box m1-8-3"><div class="matchup" data-next="qf2" data-slot="0">
                <div class="team-slot" onclick="advance(this, 'Man City')"><img src="city.png"><span class="team-name">Man City</span></div>
                <div class="team-slot" onclick="advance(this, 'Real Madrid')"><img src="real.png"><span class="team-name">Real</span></div>
            </div></div>
            <div class="match-box m1-8-4"><div class="matchup" data-next="qf2" data-slot="1">
                <div class="team-slot" onclick="advance(this, 'Bayern')"><img src="bayern.png"><span class="team-name">Bayern</span></div>
                <div class="team-slot" onclick="advance(this, 'Atalanta')"><img src="atalanta.png"><span class="team-name">Atalanta</span></div>
            </div></div>

            <div class="match-box m1-4-1"><div class="matchup" id="qf1" data-next="sf1" data-slot="0"><div class="team-slot"></div><div class="team-slot"></div></div></div>
            <div class="match-box m1-4-2"><div class="matchup" id="qf2" data-next="sf1" data-slot="1"><div class="team-slot"></div><div class="team-slot"></div></div></div>
            <div class="match-box m1-2-1"><div class="matchup" id="sf1" data-next="final" data-slot="left"><div class="team-slot" style="height:65px"></div><div class="team-slot" style="height:65px"></div></div></div>

            <div class="final-zone">
                <img src="ucl_cup.png" class="cup-img">
                <div class="final-horiz">
                    <div class="final-slot" id="final-left" onclick="declareWinner(this)"></div>
                    <div class="vs-divider">VS</div>
                    <div class="final-slot" id="final-right" onclick="declareWinner(this)"></div>
                </div>
                <div class="winner-announcement" id="winner-box" style="visibility:hidden">
                    <span id="winner-text" class="winner-name"></span>
                    <span id="winner-chance" class="winner-chance"></span>
                </div>
            </div>

            <div class="match-box m1-2-2"><div class="matchup" id="sf2" data-next="final" data-slot="right"><div class="team-slot" style="height:65px"></div><div class="team-slot" style="height:65px"></div></div></div>
            <div class="match-box m1-4-3"><div class="matchup" id="qf3" data-next="sf2" data-slot="0"><div class="team-slot"></div><div class="team-slot"></div></div></div>
            <div class="match-box m1-4-4"><div class="matchup" id="qf4" data-next="sf2" data-slot="1"><div class="team-slot"></div><div class="team-slot"></div></div></div>

            <div class="match-box m1-8-5"><div class="matchup" data-next="qf3" data-slot="0">
                <div class="team-slot" onclick="advance(this, 'Barcelona')"><img src="barca.png"><span class="team-name">Barca</span></div>
                <div class="team-slot" onclick="advance(this, 'Newcastle')"><img src="newcastle.png"><span class="team-name">Newcastle</span></div>
            </div></div>
            <div class="match-box m1-8-6"><div class="matchup" data-next="qf3" data-slot="1">
                <div class="team-slot" onclick="advance(this, 'Atletico')"><img src="atletico.png"><span class="team-name">Atletico</span></div>
                <div class="team-slot" onclick="advance(this, 'Tottenham')"><img src="spurs.png"><span class="team-name">Spurs</span></div>
            </div></div>
            <div class="match-box m1-8-7"><div class="matchup" data-next="qf4" data-slot="0">
                <div class="team-slot" onclick="advance(this, 'Sporting')"><img src="sporting.png"><span class="team-name">Sporting</span></div>
                <div class="team-slot" onclick="advance(this, 'Bodo/Glimt')"><img src="bodo.png"><span class="team-name">Bodo</span></div>
            </div></div>
            <div class="match-box m1-8-8"><div class="matchup" data-next="qf4" data-slot="1">
                <div class="team-slot" onclick="advance(this, 'Arsenal')"><img src="arsenal.png"><span class="team-name">Arsenal</span></div>
                <div class="team-slot" onclick="advance(this, 'Leverkusen')"><img src="bayer.png"><span class="team-name">Bayer</span></div>
            </div></div>
        </div>
    </div>

    <script>
        // База данных вероятностей (обновляется только в финале)
        const teamStats = {
            'PSG': '4.6%', 'Chelsea': '6.9%', 'Liverpool': '12.8%', 'Galatasaray': '0.2%',
            'Man City': '10.8%', 'Real Madrid': '2.8%', 'Bayern': '14.3%', 'Atalanta': '1.1%',
            'Barcelona': '7.7%', 'Newcastle': '4.7%', 'Atletico': '2.0%', 'Tottenham': '1.2%',
            'Sporting': '2.7%', 'Bodo/Glimt': '0.4%', 'Arsenal': '27.4%', 'Leverkusen': '0.5%'
        };

        function advance(element, teamName) {
            const currentMatchup = element.closest('.matchup');
            const nextId = currentMatchup.getAttribute('data-next');
            const slot = currentMatchup.getAttribute('data-slot');
            const imgTag = element.querySelector('img');
            if(!imgTag) return;

            if (nextId === 'final') {
                const finalSlot = document.getElementById('final-' + slot);
                finalSlot.innerHTML = `<img src="${imgTag.src}" class="advanced">`;
                finalSlot.setAttribute('data-team', teamName);
                document.getElementById('winner-box').style.visibility = "hidden";
            } else {
                const nextMatchup = document.getElementById(nextId);
                const targetSlot = nextMatchup.querySelectorAll('.team-slot')[slot];
                targetSlot.innerHTML = `<img src="${imgTag.src}" class="advanced"> <span class="team-name">${teamName}</span>`;
                targetSlot.onclick = function() { advance(this, teamName); };
            }
        }

        function declareWinner(element) {
            const team = element.getAttribute('data-team');
            if(!team) return;

            const winBox = document.getElementById('winner-box');
            const winName = document.getElementById('winner-text');
            const winChance = document.getElementById('winner-chance');

            winBox.style.visibility = "visible";
            
            // Проверка на Сити (по твоей просьбе)
            if (team === 'Man City') {
                winName.innerText = "Максим, это только твои фантазии!";
                winName.style.color = "#ff4d4d";
                winChance.innerText = "";
            } else {
                winName.innerText = "ЧЕМПИОН: " + team.toUpperCase();
                winName.style.color = "var(--gold)";
                // Вывод вероятности ТОЛЬКО ТУТ
                winChance.innerText = "ВЕРОЯТНОСТЬ ТИТУЛА: " + (teamStats[team] || "0.1%");
            }

            document.querySelectorAll('.final-slot').forEach(s => s.style.boxShadow = "none");
            element.style.boxShadow = "0 0 50px var(--gold)";
        }
    </script>
</body>
</html>
