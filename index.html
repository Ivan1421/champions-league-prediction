<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCL 2026 - Perfect Alignment</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --ucl-deep: #00041a;
            --ucl-blue: #020e4b;
            --ucl-accent: #0033ff;
            --gold: #c5a059;
            --glass: rgba(255, 255, 255, 0.07);
            --glass-border: rgba(255, 255, 255, 0.12);
        }

        body {
            background: radial-gradient(circle at center, var(--ucl-blue) 0%, var(--ucl-deep) 100%);
            color: white;
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            overflow: hidden; 
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header { text-align: center; padding: 10px 0; height: 40px; }
        h1 { font-weight: 900; letter-spacing: 5px; margin: 0; font-size: 20px; text-transform: uppercase; }

        /* Основная сетка на 7 колонок и 8 строк */
        .bracket-container {
            display: grid;
            grid-template-columns: 1.2fr 1.1fr 1fr 1.8fr 1fr 1.1fr 1.2fr;
            grid-template-rows: repeat(8, 1fr);
            gap: 10px;
            width: 100vw;
            height: calc(100vh - 60px);
            padding: 10px;
            box-sizing: border-box;
        }

        .match-box {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .matchup {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            padding: 6px;
            width: 90%;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        /* Позиционирование 1/8 финала */
        .m1-8-1 { grid-column: 1; grid-row: 1 / 3; }
        .m1-8-2 { grid-column: 1; grid-row: 3 / 5; }
        .m1-8-3 { grid-column: 1; grid-row: 5 / 7; }
        .m1-8-4 { grid-column: 1; grid-row: 7 / 9; }

        .m1-8-5 { grid-column: 7; grid-row: 1 / 3; }
        .m1-8-6 { grid-column: 7; grid-row: 3 / 5; }
        .m1-8-7 { grid-column: 7; grid-row: 5 / 7; }
        .m1-8-8 { grid-column: 7; grid-row: 7 / 9; }

        /* Позиционирование 1/4 финала - строго между парами 1/8 */
        .m1-4-1 { grid-column: 2; grid-row: 2 / 4; }
        .m1-4-2 { grid-column: 2; grid-row: 6 / 8; }
        .m1-4-3 { grid-column: 6; grid-row: 2 / 4; }
        .m1-4-4 { grid-column: 6; grid-row: 6 / 8; }

        /* Позиционирование 1/2 финала - строго в центре */
        .m1-2-1 { grid-column: 3; grid-row: 3 / 7; }
        .m1-2-2 { grid-column: 5; grid-row: 3 / 7; }

        /* Финальная зона */
        .final-zone { 
            grid-column: 4; 
            grid-row: 1 / 9; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center;
            position: relative;
        }

        .team-slot {
            height: 44px;
            display: flex;
            align-items: center;
            padding: 0 10px;
            cursor: pointer;
            transition: 0.2s;
            margin: 4px 0;
            border-radius: 4px;
        }

        .team-slot:hover { background: rgba(255, 255, 255, 0.1); }
        .team-slot img { height: 30px; width: 30px; object-fit: contain; margin-right: 10px; }
        .team-name { font-size: 10px; font-weight: 700; text-transform: uppercase; white-space: nowrap; overflow: hidden; }

        /* Элементы финала */
        .cup-img { width: 160px; margin-bottom: 20px; pointer-events: none; }
        .final-horiz { display: flex; align-items: center; gap: 20px; }
        .final-slot {
            width: 110px; height: 110px;
            border: 3px dashed var(--glass-border);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
        }
        .final-slot img { width: 80px; }
        .vs-divider { color: var(--gold); border: 2px solid var(--gold); padding: 8px; border-radius: 50%; background: var(--ucl-deep); font-size: 12px; font-weight: 900; }

        .winner-announcement { position: absolute; bottom: 5%; text-align: center; width: 100%; }
        .winner-name { font-size: 20px; font-weight: 900; color: var(--gold); display: block; }
        .final-prob { font-size: 12px; color: var(--ucl-accent); margin-top: 5px; font-weight: 600; }

        .advanced { animation: pop 0.4s ease-out; }
        @keyframes pop { from { transform: scale(0); } to { transform: scale(1); } }
        .easter-egg { color: #ff4d4d; animation: shake 0.3s infinite; }
        @keyframes shake { 0% { transform: translateX(2px); } 50% { transform: translateX(-2px); } }
    </style>
</head>
<body>

    <header><h1>ПУТЬ К ФИНАЛУ ЛЧ 2026</h1></header>

    <div class="bracket-container">
        <div class="match-box m1-8-1"><div class="matchup" data-next="qf1" data-slot="0">
            <div class="team-slot" onclick="advance(this, 'PSG', '4.6%')"><img src="psg.png"><span class="team-name">PSG</span></div>
            <div class="team-slot" onclick="advance(this, 'Chelsea', '6.9%')"><img src="chelsea.png"><span class="team-name">Chelsea</span></div>
        </div></div>
        <div class="match-box m1-8-2"><div class="matchup" data-next="qf1" data-slot="1">
            <div class="team-slot" onclick="advance(this, 'Liverpool', '12.8%')"><img src="liverpool.png"><span class="team-name">Liverpool</span></div>
            <div class="team-slot" onclick="advance(this, 'Galatasaray', '0.2%')"><img src="gala.png"><span class="team-name">Gala</span></div>
        </div></div>
        <div class="match-box m1-8-3"><div class="matchup" data-next="qf2" data-slot="0">
            <div class="team-slot" onclick="advance(this, 'Man City', '10.8%')"><img src="city.png"><span class="team-name">Man City</span></div>
            <div class="team-slot" onclick="advance(this, 'Real Madrid', '2.8%')"><img src="real.png"><span class="team-name">Real</span></div>
        </div></div>
        <div class="match-box m1-8-4"><div class="matchup" data-next="qf2" data-slot="1">
            <div class="team-slot" onclick="advance(this, 'Bayern', '14.3%')"><img src="bayern.png"><span class="team-name">Bayern</span></div>
            <div class="team-slot" onclick="advance(this, 'Atalanta', '1.1%')"><img src="atalanta.png"><span class="team-name">Atalanta</span></div>
        </div></div>

        <div class="match-box m1-4-1"><div class="matchup" id="qf1" data-next="sf1" data-slot="0"><div class="team-slot"></div><div class="team-slot"></div></div></div>
        <div class="match-box m1-4-2"><div class="matchup" id="qf2" data-next="sf1" data-slot="1"><div class="team-slot"></div><div class="team-slot"></div></div></div>

        <div class="match-box m1-2-1"><div class="matchup" id="sf1" data-next="final" data-slot="left"><div class="team-slot" style="height:60px"></div><div class="team-slot" style="height:60px"></div></div></div>

        <div class="final-zone">
            <img src="ucl_cup.png" class="cup-img">
            <div class="final-horiz">
                <div class="final-slot" id="final-left" onclick="declareWinner(this)"></div>
                <div class="vs-divider">VS</div>
                <div class="final-slot" id="final-right" onclick="declareWinner(this)"></div>
            </div>
            <div class="winner-announcement">
                <span id="winner-text" class="winner-name"></span>
                <div id="winner-stats" class="final-prob"></div>
            </div>
        </div>

        <div class="match-box m1-2-2"><div class="matchup" id="sf2" data-next="final" data-slot="right"><div class="team-slot" style="height:60px"></div><div class="team-slot" style="height:60px"></div></div></div>

        <div class="match-box m1-4-3"><div class="matchup" id="qf3" data-next="sf2" data-slot="0"><div class="team-slot"></div><div class="team-slot"></div></div></div>
        <div class="match-box m1-4-4"><div class="matchup" id="qf4" data-next="sf2" data-slot="1"><div class="team-slot"></div><div class="team-slot"></div></div></div>

        <div class="match-box m1-8-5"><div class="matchup" data-next="qf3" data-slot="0">
            <div class="team-slot" onclick="advance(this, 'Barcelona', '7.7%')"><img src="barca.png"><span class="team-name">Barca</span></div>
            <div class="team-slot" onclick="advance(this, 'Newcastle', '4.7%')"><img src="newcastle.png"><span class="team-name">Newcastle</span></div>
        </div></div>
        <div class="match-box m1-8-6"><div class="matchup" data-next="qf3" data-slot="1">
            <div class="team-slot" onclick="advance(this, 'Atletico', '2.0%')"><img src="atletico.png"><span class="team-name">Atletico</span></div>
            <div class="team-slot" onclick="advance(this, 'Tottenham', '1.2%')"><img src="spurs.png"><span class="team-name">Spurs</span></div>
        </div></div>
        <div class="match-box m1-8-7"><div class="matchup" data-next="qf4" data-slot="0">
            <div class="team-slot" onclick="advance(this, 'Sporting', '2.7%')"><img src="sporting.png"><span class="team-name">Sporting</span></div>
            <div class="team-slot" onclick="advance(this, 'Bodo/Glimt', '0.4%')"><img src="bodo.png"><span class="team-name">Bodo</span></div>
        </div></div>
        <div class="match-box m1-8-8"><div class="matchup" data-next="qf4" data-slot="1">
            <div class="team-slot" onclick="advance(this, 'Arsenal', '27.4%')"><img src="arsenal.png"><span class="team-name">Arsenal</span></div>
            <div class="team-slot" onclick="advance(this, 'Leverkusen', '0.5%')"><img src="bayer.png"><span class="team-name">Bayer</span></div>
        </div></div>
    </div>

    <script>
        function advance(element, teamName, probability) {
            const currentMatchup = element.closest('.matchup');
            const nextId = currentMatchup.getAttribute('data-next');
            const slot = currentMatchup.getAttribute('data-slot');
            const imgTag = element.querySelector('img');
            if(!imgTag) return;

            if (nextId === 'final') {
                const finalSlot = document.getElementById('final-' + slot);
                finalSlot.innerHTML = `<img src="${imgTag.src}" class="advanced">`;
                finalSlot.setAttribute('data-team', teamName);
                finalSlot.setAttribute('data-prob', probability);
                document.getElementById('winner-text').innerText = "";
                document.getElementById('winner-stats').innerText = "";
            } else {
                const nextMatchup = document.getElementById(nextId);
                const targetSlot = nextMatchup.querySelectorAll('.team-slot')[slot];
                targetSlot.innerHTML = `<img src="${imgTag.src}" class="advanced"> <span class="team-name">${teamName}</span>`;
                targetSlot.onclick = function() { advance(this, teamName, probability); };
            }
        }

        function declareWinner(element) {
            const team = element.getAttribute('data-team');
            const prob = element.getAttribute('data-prob');
            if(!team) return;
            const winName = document.getElementById('winner-text');
            const winStats = document.getElementById('winner-stats');
            if (team === 'Man City') {
                winName.innerText = "Максим, это только твои фантазии!";
                winName.className = "winner-name easter-egg";
                winStats.innerText = "";
            } else {
                winName.innerText = "ЧЕМПИОН: " + team.toUpperCase();
                winName.className = "winner-name";
                winStats.innerText = "ВЕРОЯТНОСТЬ ПОБЕДЫ: " + prob;
            }
            document.querySelectorAll('.final-slot').forEach(s => s.style.boxShadow = "none");
            element.style.boxShadow = "0 0 40px var(--gold)";
        }
    </script>
</body>
</html>
